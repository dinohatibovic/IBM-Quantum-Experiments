name: Bug Report
description: Report a bug in QOptiSolve
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Problem description
      description: Clearly describe what happened
  - type: textarea
    attributes:
      label: Reproduction
      description: Steps to reproduce the bug
  - type: textarea
    attributes:
      label: Expected behavior
  - type: textarea
    attributes:
      label: Logs / output
  - type: input
    attributes:
      label: Version
      placeholder: e.g. main, dev
